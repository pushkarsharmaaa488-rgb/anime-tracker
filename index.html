<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Anime Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anime Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px 14px 40px;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; font-size: 0.75rem; color: #6b6b8a; margin-bottom: 22px; }

  /* ADD BAR */
  .add-bar {
    display: flex; gap: 8px; margin-bottom: 22px;
  }
  .add-bar input {
    flex: 1;
    background: #16162a;
    border: 1px solid #2a2a45;
    border-radius: 10px;
    padding: 10px 14px;
    color: #e8e8f0;
    font-size: 0.85rem;
    outline: none;
  }
  .add-bar input:focus { border-color: #a78bfa; }
  .add-bar input::placeholder { color: #4b4b7a; }
  .add-btn {
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    border: none; border-radius: 10px;
    padding: 10px 16px;
    color: white; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; white-space: nowrap;
  }
  .add-btn:active { opacity: 0.8; }

  /* ADD OPTIONS */
  .add-options {
    display: none;
    gap: 8px; margin-top: -14px; margin-bottom: 18px;
  }
  .add-options.show { display: flex; }
  .opt-btn {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .opt-watched { background: #1e3a2f; color: #4ade80; }
  .opt-dropped { background: #3a1e1e; color: #f87171; }

  /* SECTION */
  .section {
    background: #16162a;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 18px;
    border: 1px solid #2a2a45;
  }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .section-title { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
  .badge-watched { background: #1e3a2f; color: #4ade80; }
  .badge-dropped { background: #3a1e1e; color: #f87171; }
  .copy-btn {
    background: #2a2a45; color: #a78bfa;
    border: 1px solid #3d3d6b; border-radius: 8px;
    padding: 5px 12px; font-size: 0.75rem; cursor: pointer; font-weight: 600;
  }
  .copy-btn:active { background: #3d3d6b; }
  .copy-btn.copied { background: #1e3a2f; color: #4ade80; border-color: #4ade80; }

  /* ANIME ITEMS */
  .anime-list { display: flex; flex-direction: column; gap: 6px; }
  .anime-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 10px;
    background: #1e1e35; cursor: pointer;
    transition: all 0.2s; user-select: none;
    position: relative;
  }
  .anime-item:active { transform: scale(0.98); }
  .anime-item.watched-item { border-left: 3px solid #4ade80; }
  .anime-item.dropped-item { border-left: 3px solid #f87171; }
  .anime-item.just-moved {
    animation: moveAnim 0.4s ease;
  }
  @keyframes moveAnim {
    0% { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .num { color: #4b4b7a; font-size: 0.7rem; min-width: 20px; text-align: right; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-watched { background: #4ade80; }
  .dot-dropped { background: #f87171; }
  .anime-name { font-size: 0.82rem; flex: 1; }
  .hint { font-size: 0.65rem; color: #4b4b7a; }
  .delete-btn {
    background: none; border: none; color: #3a2a2a;
    font-size: 1rem; cursor: pointer; padding: 0 4px;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: #f87171; }
  .drop-btn {
    background: none; border: 1px solid #3a1e1e; border-radius: 6px;
    color: #f87171; font-size: 0.65rem; cursor: pointer;
    padding: 2px 6px; white-space: nowrap;
    transition: all 0.2s; font-weight: 600;
  }
  .drop-btn:hover { background: #3a1e1e; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e3a2f; color: #4ade80;
    padding: 10px 20px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
    border: 1px solid #4ade80;
  }
  .toast.show { opacity: 1; }
  .toast.red { background: #3a1e1e; color: #f87171; border-color: #f87171; }

  .empty { text-align: center; color: #4b4b7a; font-size: 0.8rem; padding: 12px 0; }
</style>
</head>
<body>

<h1>🎌 Pushkar's Anime</h1>
<p class="subtitle">Tap dropped → watched • "Drop" button → watched se drop • ✕ = delete</p>

<div class="add-bar">
  <input type="text" id="animeInput" placeholder="Anime ka naam daal..." />
  <button class="add-btn" onclick="showOptions()">+ Add</button>
</div>
<div class="add-options" id="addOptions">
  <button class="opt-btn opt-watched" onclick="addAnime('watched')">✅ Watched</button>
  <button class="opt-btn opt-dropped" onclick="addAnime('dropped')">❌ Dropped</button>
</div>

<!-- WATCHED -->
<div class="section">
  <div class="section-header">
    <div class="section-title">✅ Watched <span class="badge badge-watched" id="watched-count">0</span></div>
    <button class="copy-btn" id="copy-watched" onclick="copyList('watched')">Copy</button>
  </div>
  <div class="anime-list" id="watched-list"></div>
</div>

<!-- DROPPED -->
<div class="section">
  <div class="section-header">
    <div class="section-title">❌ Dropped <span class="badge badge-dropped" id="dropped-count">0</span></div>
    <button class="copy-btn" id="copy-dropped" onclick="copyList('dropped')">Copy</button>
  </div>
  <div class="anime-list" id="dropped-list"></div>
  <p class="hint" style="margin-top:10px; text-align:center; color:#4b4b7a; font-size:0.7rem;">👆 Tap any dropped anime to move it to Watched</p>
</div>

<div class="toast" id="toast"></div>

<script>
let data = {
  watched: [
    "Attack on Titan","Death Note","Demon Slayer","One Piece (3 seasons)","Chainsaw Man",
    "Blue Lock","Cyberpunk Edgerunners","The Quintessential Quintuplets","My Dress-Up Darling",
    "Darling in the FranXX","My Hero Academia","Solo Leveling","Tensura","Dr. Stone",
    "Jujutsu Kaisen","Daemons of the Shadow Realm","Classroom of the Elite","Horimiya",
    "A Couple of Cuckoos","Sword Art Online","Gachiakuta","Spy x Family",
    "I Got a Cheat Skill in Another World","More than a Married Couple but Not Lovers",
    "Can a Boy-Girl Friendship Survive","Re:Zero","Dandadan","Assassination Classroom",
    "I'm Getting Married to a Girl I Hate in My Class","Mushoku Tensei","Tomo-chan Is a Girl",
    "Alya Sometimes Hides Her Feelings in Russian","Mob Psycho 100","Shangri-La Frontier",
    "Kaiju No. 8","Wind Breaker","Tokyo Revengers","Mashle","Tower of God","Your Lie in April",
    "Beast Tamer","Berserk of Gluttony","A Sign of Affection","Zom 100","A Condition Called Love",
    "Our Dating Story","Medaka Kuroiwa Is Impervious to My Charms","Grand Blue",
    "The Summer Hikaru Died","Please Put Them On Takamine-san","Higehiro","A Silent Voice",
    "Suzume","Weathering with You","I Made Friends with the Second Prettiest Girl in My Class",
    "The Girl I Like Forgot Her Glasses","The Fragrant Flower Blooms with Dignity",
    "Nukitashi the Animation","Elfen Lied","Redo of Healer","Komi Can't Communicate",
    "Kubo Won't Let Me Be Invisible","Takopi's Original Sin","You and I Are Polar Opposites",
    "Erased","Chained Soldier"
  ],
  dropped: [
    "Haikyuu","Bunny Girl Senpai","Black Clover","Rent a Girlfriend",
    "Konosuba","Frieren","Fire Force","Kamisama Kiss"
  ]
};

// Load from localStorage if available
try {
  const saved = localStorage.getItem('pushkar_anime');
  if (saved) data = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('pushkar_anime', JSON.stringify(data)); } catch(e) {}
}

function render() {
  renderSection('watched');
  renderSection('dropped');
  document.getElementById('watched-count').textContent = data.watched.length;
  document.getElementById('dropped-count').textContent = data.dropped.length;
}

function renderSection(type) {
  const container = document.getElementById(`${type}-list`);
  container.innerHTML = '';
  if (data[type].length === 0) {
    container.innerHTML = `<div class="empty">Koi anime nahi hai yahan!</div>`;
    return;
  }
  data[type].forEach((name, i) => {
    const div = document.createElement('div');
    div.className = `anime-item ${type}-item`;
    const extraBtn = type === 'watched'
      ? `<button class="drop-btn" onclick="moveToDropped(${i}, event)">Drop</button>`
      : '';
    div.innerHTML = `
      <span class="num">${i+1}</span>
      <span class="dot dot-${type}"></span>
      <span class="anime-name">${name}</span>
      ${extraBtn}
      <button class="delete-btn" onclick="deleteAnime('${type}', ${i}, event)" title="Delete">✕</button>
    `;
    if (type === 'dropped') {
      div.onclick = (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        moveToWatched(i);
      };
    }
    container.appendChild(div);
  });
}

function moveToWatched(idx) {
  const name = data.dropped[idx];
  data.dropped.splice(idx, 1);
  data.watched.push(name);
  save();
  render();
  // Highlight last item in watched
  setTimeout(() => {
    const items = document.querySelectorAll('#watched-list .anime-item');
    if (items.length > 0) {
      const last = items[items.length - 1];
      last.classList.add('just-moved');
      last.style.borderLeftColor = '#a78bfa';
      setTimeout(() => { last.style.borderLeftColor = '#4ade80'; }, 800);
    }
  }, 50);
  showToast(`✅ "${name}" watched list mein aa gaya!`);
}

function moveToDropped(idx, e) {
  e.stopPropagation();
  const name = data.watched[idx];
  data.watched.splice(idx, 1);
  data.dropped.push(name);
  save();
  render();
  setTimeout(() => {
    const items = document.querySelectorAll('#dropped-list .anime-item');
    if (items.length > 0) {
      const last = items[items.length - 1];
      last.classList.add('just-moved');
    }
  }, 50);
  showToast(`❌ "${name}" dropped list mein aa gaya!`, true);
}

function deleteAnime(type, idx, e) {
  e.stopPropagation();
  const name = data[type][idx];
  if (confirm(`"${name}" delete karna hai?`)) {
    data[type].splice(idx, 1);
    save();
    render();
    showToast(`🗑️ "${name}" delete ho gaya`, true);
  }
}

let pendingName = '';
function showOptions() {
  const input = document.getElementById('animeInput');
  const name = input.value.trim();
  if (!name) { showToast('Pehle naam daal bhai!', true); return; }
  pendingName = name;
  document.getElementById('addOptions').classList.add('show');
}

function addAnime(type) {
  if (!pendingName) return;
  data[type].push(pendingName);
  save();
  render();
  document.getElementById('animeInput').value = '';
  document.getElementById('addOptions').classList.remove('show');
  showToast(`${type === 'watched' ? '✅' : '❌'} "${pendingName}" add ho gaya!`);
  pendingName = '';
}

// Hide options on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.add-bar') && !e.target.closest('.add-options')) {
    document.getElementById('addOptions').classList.remove('show');
  }
});

// Enter key
document.getElementById('animeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') showOptions();
});

function copyList(type) {
  const text = data[type].map((n, i) => `${i+1}. ${n}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-${type}`);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function showToast(msg, red = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (red ? ' red' : '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

render();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
