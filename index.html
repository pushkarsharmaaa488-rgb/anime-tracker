<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anime Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px 14px 40px;
  }
  h1 {
    text-align: center; font-size: 1.5rem; margin-bottom: 4px;
    background: linear-gradient(90deg, #a78bfa, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; font-size: 0.72rem; color: #6b6b8a; margin-bottom: 16px; }

  /* STATS BAR */
  .stats {
    display: flex; justify-content: center; gap: 16px;
    margin-bottom: 20px;
  }
  .stat {
    text-align: center; background: #16162a;
    border-radius: 10px; padding: 8px 14px;
    border: 1px solid #2a2a45;
  }
  .stat-num { font-size: 1.2rem; font-weight: 700; }
  .stat-label { font-size: 0.65rem; color: #6b6b8a; }
  .stat-num.green { color: #4ade80; }
  .stat-num.blue { color: #60a5fa; }
  .stat-num.yellow { color: #fbbf24; }
  .stat-num.red { color: #f87171; }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .tab {
    flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
    border: 1px solid #2a2a45; background: #16162a;
    color: #6b6b8a; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: #a78bfa; color: white; border-color: #a78bfa; }

  /* ADD BAR */
  .add-bar { display: flex; gap: 8px; margin-bottom: 10px; }
  .add-bar input {
    flex: 1; background: #16162a; border: 1px solid #2a2a45;
    border-radius: 10px; padding: 10px 14px; color: #e8e8f0;
    font-size: 0.85rem; outline: none;
  }
  .add-bar input:focus { border-color: #a78bfa; }
  .add-bar input::placeholder { color: #4b4b7a; }
  .add-btn {
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    border: none; border-radius: 10px; padding: 10px 16px;
    color: white; font-weight: 700; font-size: 0.85rem; cursor: pointer;
  }

  /* ADD OPTIONS */
  .add-options { display: none; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-options.show { display: flex; }
  .opt-btn {
    flex: 1; min-width: 80px; padding: 8px; border-radius: 8px;
    border: none; font-size: 0.75rem; font-weight: 600; cursor: pointer;
  }
  .opt-watched { background: #1e3a2f; color: #4ade80; }
  .opt-watching { background: #1e2a3a; color: #60a5fa; }
  .opt-want { background: #2a2a1e; color: #fbbf24; }
  .opt-dropped { background: #3a1e1e; color: #f87171; }

  /* SECTION */
  .section { background: #16162a; border-radius: 14px; padding: 16px; border: 1px solid #2a2a45; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .section-title { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
  .badge-watched { background: #1e3a2f; color: #4ade80; }
  .badge-watching { background: #1e2a3a; color: #60a5fa; }
  .badge-want { background: #2a2a1e; color: #fbbf24; }
  .badge-dropped { background: #3a1e1e; color: #f87171; }
  .copy-btn {
    background: #2a2a45; color: #a78bfa; border: 1px solid #3d3d6b;
    border-radius: 8px; padding: 5px 12px; font-size: 0.75rem; cursor: pointer; font-weight: 600;
  }
  .copy-btn.copied { background: #1e3a2f; color: #4ade80; border-color: #4ade80; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .sort-btn {
    background: #1e1e35; border: 1px solid #2a2a45; border-radius: 8px;
    color: #a78bfa; font-size: 0.72rem; padding: 5px 10px; cursor: pointer; font-weight: 600;
  }
  .sort-btn.active { background: #a78bfa; color: white; border-color: #a78bfa; }
  .random-btn {
    background: linear-gradient(135deg, #f472b6, #fbbf24);
    border: none; border-radius: 8px; color: white;
    font-size: 0.72rem; padding: 5px 10px; cursor: pointer; font-weight: 700;
  }
  .mal-btn {
    background: #1e2a3a; border: 1px solid #60a5fa; border-radius: 8px;
    color: #60a5fa; font-size: 0.65rem; padding: 2px 6px; cursor: pointer; font-weight: 600;
    text-decoration: none; flex-shrink: 0; white-space: nowrap;
  }
  .random-result {
    display: none; background: #1e1e35; border-radius: 12px;
    padding: 14px; margin-bottom: 12px; text-align: center;
    border: 1px solid #f472b6;
  }
  .random-result.show { display: block; }
  .random-result-label { font-size: 0.7rem; color: #6b6b8a; margin-bottom: 6px; }
  .random-result-name { font-size: 1rem; font-weight: 700; color: #f472b6; margin-bottom: 10px; }
  .random-result-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .rr-btn { padding: 6px 14px; border-radius: 8px; border: none; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

  /* ANIME ITEMS */
  .anime-list { display: flex; flex-direction: column; gap: 6px; }
  .anime-item {
    border-radius: 10px; background: #1e1e35;
    transition: all 0.2s; user-select: none; overflow: hidden;
  }
  .anime-item.just-moved { animation: moveAnim 0.4s ease; }
  @keyframes moveAnim {
    0% { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .anime-main {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  }
  .anime-item.watched-item { border-left: 3px solid #4ade80; }
  .anime-item.watching-item { border-left: 3px solid #60a5fa; }
  .anime-item.want-item { border-left: 3px solid #fbbf24; }
  .anime-item.dropped-item { border-left: 3px solid #f87171; }
  .num { color: #4b4b7a; font-size: 0.7rem; min-width: 20px; text-align: right; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-watched { background: #4ade80; }
  .dot-watching { background: #60a5fa; }
  .dot-want { background: #fbbf24; }
  .dot-dropped { background: #f87171; }
  .anime-name { font-size: 0.82rem; flex: 1; }

  /* STARS */
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 0.85rem; cursor: pointer; color: #3a3a5a;
    transition: color 0.15s;
  }
  .star.filled { color: #fbbf24; }

  /* ACTION BUTTONS */
  .action-btns { display: flex; gap: 4px; }
  .move-btn {
    background: none; border: 1px solid #2a2a45; border-radius: 6px;
    font-size: 0.6rem; cursor: pointer; padding: 2px 5px;
    font-weight: 600; transition: all 0.2s; white-space: nowrap;
  }
  .move-btn.to-watched { color: #4ade80; border-color: #1e3a2f; }
  .move-btn.to-watching { color: #60a5fa; border-color: #1e2a3a; }
  .move-btn.to-want { color: #fbbf24; border-color: #2a2a1e; }
  .move-btn.to-dropped { color: #f87171; border-color: #3a1e1e; }
  .delete-btn {
    background: none; border: none; color: #3a2a2a;
    font-size: 1rem; cursor: pointer; padding: 0 4px; transition: color 0.2s;
  }
  .delete-btn:hover { color: #f87171; }

  /* MOVE MENU */
  .move-menu {
    display: none; padding: 8px 10px 10px;
    border-top: 1px solid #2a2a45;
    gap: 6px; flex-wrap: wrap;
  }
  .move-menu.show { display: flex; }
  .move-menu-btn {
    flex: 1; min-width: 70px; padding: 6px 8px; border-radius: 7px;
    border: none; font-size: 0.72rem; font-weight: 600; cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e3a2f; color: #4ade80; padding: 10px 20px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap; border: 1px solid #4ade80;
  }
  .toast.show { opacity: 1; }
  .toast.red { background: #3a1e1e; color: #f87171; border-color: #f87171; }
  .toast.blue { background: #1e2a3a; color: #60a5fa; border-color: #60a5fa; }
  .toast.yellow { background: #2a2a1e; color: #fbbf24; border-color: #fbbf24; }

  .empty { text-align: center; color: #4b4b7a; font-size: 0.8rem; padding: 16px 0; }
</style>
</head>
<body>

<h1>🎌 Anime Tracker</h1>
<p class="subtitle">Track • Rate • Plan</p>

<div class="stats">
  <div class="stat"><div class="stat-num green" id="s-watched">0</div><div class="stat-label">Watched</div></div>
  <div class="stat"><div class="stat-num blue" id="s-watching">0</div><div class="stat-label">Watching</div></div>
  <div class="stat"><div class="stat-num yellow" id="s-want">0</div><div class="stat-label">Want</div></div>
  <div class="stat"><div class="stat-num red" id="s-dropped">0</div><div class="stat-label">Dropped</div></div>
</div>

<div class="add-bar">
  <input type="text" id="animeInput" placeholder="Anime ka naam daal..." />
  <button class="add-btn" onclick="showOptions()">+ Add</button>
</div>
<div class="add-options" id="addOptions">
  <button class="opt-btn opt-watched" onclick="addAnime('watched')">✅ Watched</button>
  <button class="opt-btn opt-watching" onclick="addAnime('watching')">▶️ Watching</button>
  <button class="opt-btn opt-want" onclick="addAnime('want')">🔖 Want</button>
  <button class="opt-btn opt-dropped" onclick="addAnime('dropped')">❌ Dropped</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('watched')">✅ Watched</div>
  <div class="tab" onclick="switchTab('watching')">▶️ Watching</div>
  <div class="tab" onclick="switchTab('want')">🔖 Want</div>
  <div class="tab" onclick="switchTab('dropped')">❌ Dropped</div>
</div>

<div class="random-result" id="randomResult">
  <div class="random-result-label">🎲 Aaj yeh dekh bhai!</div>
  <div class="random-result-name" id="randomName"></div>
  <div class="random-result-btns">
    <button class="rr-btn" style="background:#1e3a2f;color:#4ade80;" onclick="moveRandomToWatching()">▶️ Watching mein daal</button>
    <a class="rr-btn mal-btn" id="randomMalLink" href="#" target="_blank" style="background:#1e2a3a;color:#60a5fa;padding:6px 14px;">🔍 MAL pe dekh</a>
    <button class="rr-btn" style="background:#1e1e35;color:#6b6b8a;" onclick="closeRandom()">✕ Band kar</button>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <button class="sort-btn active" id="sort-default" onclick="setSort('default')">Default</button>
  <button class="sort-btn" id="sort-name" onclick="setSort('name')">A-Z</button>
  <button class="sort-btn" id="sort-rating" onclick="setSort('rating')">⭐ Rating</button>
  <div style="flex:1"></div>
  <button class="random-btn" id="randomBtn" onclick="randomPick()" style="display:none">🎲 Random</button>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title" id="section-title">✅ Watched <span class="badge badge-watched" id="current-count">0</span></div>
    <button class="copy-btn" id="copy-current" onclick="copyCurrentList()">Copy</button>
  </div>
  <div class="anime-list" id="current-list"></div>
</div>

<div class="toast" id="toast"></div>
<div style="text-align:center; margin-top:24px; font-size:0.72rem; color:#6b6b8a;">made by pushkar ✨</div>

<script>
const TYPES = {
  watched:  { label: '✅ Watched',  badge: 'badge-watched',  dot: 'dot-watched',  color: '#4ade80', toastClass: '' },
  watching: { label: '▶️ Watching', badge: 'badge-watching', dot: 'dot-watching', color: '#60a5fa', toastClass: 'blue' },
  want:     { label: '🔖 Want',     badge: 'badge-want',     dot: 'dot-want',     color: '#fbbf24', toastClass: 'yellow' },
  dropped:  { label: '❌ Dropped',  badge: 'badge-dropped',  dot: 'dot-dropped',  color: '#f87171', toastClass: 'red' },
};

let currentTab = 'watched';

let data = {
  watched: [
    {name:"Attack on Titan",rating:0},{name:"Death Note",rating:0},{name:"Demon Slayer",rating:0},
    {name:"One Piece (3 seasons)",rating:0},{name:"Chainsaw Man",rating:0},{name:"Blue Lock",rating:0},
    {name:"Cyberpunk Edgerunners",rating:0},{name:"The Quintessential Quintuplets",rating:0},
    {name:"My Dress-Up Darling",rating:0},{name:"Darling in the FranXX",rating:0},
    {name:"My Hero Academia",rating:0},{name:"Solo Leveling",rating:0},{name:"Tensura",rating:0},
    {name:"Dr. Stone",rating:0},{name:"Jujutsu Kaisen",rating:0},{name:"Daemons of the Shadow Realm",rating:0},
    {name:"Classroom of the Elite",rating:0},{name:"Horimiya",rating:0},{name:"A Couple of Cuckoos",rating:0},
    {name:"Sword Art Online",rating:0},{name:"Gachiakuta",rating:0},{name:"Spy x Family",rating:0},
    {name:"I Got a Cheat Skill in Another World",rating:0},{name:"More than a Married Couple but Not Lovers",rating:0},
    {name:"Can a Boy-Girl Friendship Survive",rating:0},{name:"Re:Zero",rating:0},{name:"Dandadan",rating:0},
    {name:"Assassination Classroom",rating:0},{name:"I'm Getting Married to a Girl I Hate in My Class",rating:0},
    {name:"Mushoku Tensei",rating:0},{name:"Tomo-chan Is a Girl",rating:0},
    {name:"Alya Sometimes Hides Her Feelings in Russian",rating:0},{name:"Mob Psycho 100",rating:0},
    {name:"Shangri-La Frontier",rating:0},{name:"Kaiju No. 8",rating:0},{name:"Wind Breaker",rating:0},
    {name:"Tokyo Revengers",rating:0},{name:"Mashle",rating:0},{name:"Tower of God",rating:0},
    {name:"Your Lie in April",rating:0},{name:"Beast Tamer",rating:0},{name:"Berserk of Gluttony",rating:0},
    {name:"A Sign of Affection",rating:0},{name:"Zom 100",rating:0},{name:"A Condition Called Love",rating:0},
    {name:"Our Dating Story",rating:0},{name:"Medaka Kuroiwa Is Impervious to My Charms",rating:0},
    {name:"Grand Blue",rating:0},{name:"The Summer Hikaru Died",rating:0},
    {name:"Please Put Them On Takamine-san",rating:0},{name:"Higehiro",rating:0},
    {name:"A Silent Voice",rating:0},{name:"Suzume",rating:0},{name:"Weathering with You",rating:0},
    {name:"I Made Friends with the Second Prettiest Girl in My Class",rating:0},
    {name:"The Girl I Like Forgot Her Glasses",rating:0},
    {name:"The Fragrant Flower Blooms with Dignity",rating:0},{name:"Nukitashi the Animation",rating:0},
    {name:"Elfen Lied",rating:0},{name:"Redo of Healer",rating:0},{name:"Komi Can't Communicate",rating:0},
    {name:"Kubo Won't Let Me Be Invisible",rating:0},{name:"Takopi's Original Sin",rating:0},
    {name:"You and I Are Polar Opposites",rating:0},{name:"Erased",rating:0},{name:"Chained Soldier",rating:0}
  ],
  watching: [],
  want: [],
  dropped: [
    {name:"Haikyuu",rating:0},{name:"Bunny Girl Senpai",rating:0},{name:"Black Clover",rating:0},
    {name:"Rent a Girlfriend",rating:0},{name:"Konosuba",rating:0},{name:"Frieren",rating:0},
    {name:"Fire Force",rating:0},{name:"Kamisama Kiss",rating:0}
  ]
};

try {
  const saved = localStorage.getItem('anime_tracker_v2');
  if (saved) data = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('anime_tracker_v2', JSON.stringify(data)); } catch(e) {}
}

function updateStats() {
  document.getElementById('s-watched').textContent = data.watched.length;
  document.getElementById('s-watching').textContent = data.watching.length;
  document.getElementById('s-want').textContent = data.want.length;
  document.getElementById('s-dropped').textContent = data.dropped.length;
}

let currentSort = 'default';

function setSort(s) {
  currentSort = s;
  ['default','name','rating'].forEach(x => {
    document.getElementById('sort-'+x).classList.toggle('active', x === s);
  });
  renderCurrent();
}

function getSortedList(type) {
  const list = [...data[type]];
  if (currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'rating') list.sort((a,b) => b.rating - a.rating);
  return list;
}

let randomIdx = -1;
let randomOrigList = [];

function randomPick() {
  const list = data[currentTab];
  if (list.length === 0) { showToast('List khaali hai!', 'red'); return; }
  const idx = Math.floor(Math.random() * list.length);
  randomIdx = idx;
  randomOrigList = currentTab;
  const name = list[idx].name;
  document.getElementById('randomName').textContent = name;
  document.getElementById('randomMalLink').href = `https://myanimelist.net/search/all?q=${encodeURIComponent(name)}&cat=anime`;
  document.getElementById('randomResult').classList.add('show');
}

function closeRandom() {
  document.getElementById('randomResult').classList.remove('show');
  randomIdx = -1;
}

function moveRandomToWatching() {
  if (randomIdx < 0) return;
  const item = data[randomOrigList][randomIdx];
  data[randomOrigList].splice(randomIdx, 1);
  data.watching.push(item);
  save();
  closeRandom();
  switchTab('watching');
  showToast('▶️ Watching mein daal diya!', 'blue');
}

function switchTab(type) {
  currentTab = type;
  currentSort = 'default';
  ['default','name','rating'].forEach(x => {
    document.getElementById('sort-'+x).classList.toggle('active', x === 'default');
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['watched','watching','want','dropped'][i] === type);
  });
  // Show random btn only for dropped and want
  const showRandom = type === 'dropped' || type === 'want';
  document.getElementById('randomBtn').style.display = showRandom ? 'block' : 'none';
  // Hide rating sort for non-watched
  document.getElementById('sort-rating').style.display = type === 'watched' ? 'block' : 'none';
  closeRandom();
  renderCurrent();
}

function renderCurrent() {
  const type = currentTab;
  const info = TYPES[type];
  const list = data[type];
  document.getElementById('section-title').innerHTML =
    `${info.label} <span class="badge ${info.badge}" id="current-count">${list.length}</span>`;
  const container = document.getElementById('current-list');
  container.innerHTML = '';
  if (list.length === 0) {
    container.innerHTML = `<div class="empty">Koi anime nahi hai yahan!</div>`;
    return;
  }
  const sortedList = getSortedList(type);
  sortedList.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = `anime-item ${type}-item`;

    // Other type buttons
    const origIdx = data[type].indexOf(item);
    const otherBtns = Object.keys(TYPES).filter(t => t !== type).map(t =>
      `<button class="move-menu-btn opt-${t}" onclick="moveTo('${type}',${origIdx},'${t}',event)">${TYPES[t].label}</button>`
    ).join('');

    // Stars
    let starsHtml = '';
    if (type === 'watched') {
      starsHtml = `<div class="stars" onclick="event.stopPropagation()">` +
        [1,2,3,4,5].map(s =>
          `<span class="star ${item.rating >= s ? 'filled' : ''}" onclick="setRating('${type}',${origIdx},${s},event)">★</span>`
        ).join('') + `</div>`;
    }

    // MAL link
    const malUrl = `https://myanimelist.net/search/all?q=${encodeURIComponent(item.name)}&cat=anime`;
    const malBtnHtml = `<a class="mal-btn" href="${malUrl}" target="_blank" onclick="event.stopPropagation()">MAL</a>`;

    div.innerHTML = `
      <div class="anime-main">
        <span class="num">${i+1}</span>
        <span class="dot ${info.dot}"></span>
        <span class="anime-name">${item.name}</span>
        ${starsHtml}
        <div class="action-btns">
          ${malBtnHtml}
          <button class="move-btn" onclick="toggleMenu(this, event)">↕</button>
          <button class="delete-btn" onclick="deleteAnime('${type}',${origIdx},event)">✕</button>
        </div>
      </div>
      <div class="move-menu">${otherBtns}</div>
    `;
    container.appendChild(div);
  });
  updateStats();
}

function toggleMenu(btn, e) {
  e.stopPropagation();
  const menu = btn.closest('.anime-item').querySelector('.move-menu');
  document.querySelectorAll('.move-menu.show').forEach(m => { if(m !== menu) m.classList.
