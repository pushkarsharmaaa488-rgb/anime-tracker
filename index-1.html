<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anime Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f1a; color:#e8e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; padding:20px 14px 40px; }
h1 { text-align:center; font-size:1.5rem; margin-bottom:4px; background:linear-gradient(90deg,#a78bfa,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { text-align:center; font-size:0.72rem; color:#6b6b8a; margin-bottom:16px; }
.stats { display:flex; justify-content:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.stat { text-align:center; background:#16162a; border-radius:10px; padding:8px 14px; border:1px solid #2a2a45; }
.stat-num { font-size:1.2rem; font-weight:700; }
.stat-label { font-size:0.65rem; color:#6b6b8a; }
.c-green { color:#4ade80; } .c-blue { color:#60a5fa; } .c-yellow { color:#fbbf24; } .c-red { color:#f87171; }
.tabs { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
.tab { flex-shrink:0; padding:7px 14px; border-radius:20px; border:1px solid #2a2a45; background:#16162a; color:#6b6b8a; font-size:0.78rem; font-weight:600; cursor:pointer; }
.tab.active { background:#a78bfa; color:white; border-color:#a78bfa; }
.add-bar { display:flex; gap:8px; margin-bottom:10px; }
.add-bar input { flex:1; background:#16162a; border:1px solid #2a2a45; border-radius:10px; padding:10px 14px; color:#e8e8f0; font-size:0.85rem; outline:none; }
.add-bar input:focus { border-color:#a78bfa; }
.add-bar input::placeholder { color:#4b4b7a; }
.add-btn { background:linear-gradient(135deg,#a78bfa,#f472b6); border:none; border-radius:10px; padding:10px 16px; color:white; font-weight:700; font-size:0.85rem; cursor:pointer; }
.add-options { display:none; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.add-options.show { display:flex; }
.opt-btn { flex:1; min-width:80px; padding:8px; border-radius:8px; border:none; font-size:0.75rem; font-weight:600; cursor:pointer; }
.opt-watched { background:#1e3a2f; color:#4ade80; }
.opt-watching { background:#1e2a3a; color:#60a5fa; }
.opt-want { background:#2a2a1e; color:#fbbf24; }
.opt-dropped { background:#3a1e1e; color:#f87171; }
.toolbar { display:flex; gap:6px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
.sort-btn { background:#1e1e35; border:1px solid #2a2a45; border-radius:8px; color:#a78bfa; font-size:0.72rem; padding:5px 10px; cursor:pointer; font-weight:600; }
.sort-btn.active { background:#a78bfa; color:white; border-color:#a78bfa; }
.random-btn { background:linear-gradient(135deg,#f472b6,#fbbf24); border:none; border-radius:8px; color:white; font-size:0.72rem; padding:5px 12px; cursor:pointer; font-weight:700; display:none; }
.section { background:#16162a; border-radius:14px; padding:16px; border:1px solid #2a2a45; }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title { font-size:0.95rem; font-weight:700; display:flex; align-items:center; gap:8px; }
.badge { font-size:0.7rem; padding:2px 8px; border-radius:99px; font-weight:700; }
.badge-watched { background:#1e3a2f; color:#4ade80; }
.badge-watching { background:#1e2a3a; color:#60a5fa; }
.badge-want { background:#2a2a1e; color:#fbbf24; }
.badge-dropped { background:#3a1e1e; color:#f87171; }
.copy-btn { background:#2a2a45; color:#a78bfa; border:1px solid #3d3d6b; border-radius:8px; padding:5px 12px; font-size:0.75rem; cursor:pointer; font-weight:600; }
.copy-btn.copied { background:#1e3a2f; color:#4ade80; border-color:#4ade80; }
.anime-list { display:flex; flex-direction:column; gap:6px; }
.anime-item { border-radius:10px; background:#1e1e35; overflow:hidden; }
.anime-item.watched-item { border-left:3px solid #4ade80; }
.anime-item.watching-item { border-left:3px solid #60a5fa; }
.anime-item.want-item { border-left:3px solid #fbbf24; }
.anime-item.dropped-item { border-left:3px solid #f87171; }
.anime-main { display:flex; align-items:center; gap:8px; padding:9px 10px; }
.num { color:#4b4b7a; font-size:0.7rem; min-width:18px; text-align:right; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot-watched { background:#4ade80; } .dot-watching { background:#60a5fa; } .dot-want { background:#fbbf24; } .dot-dropped { background:#f87171; }
.anime-name { font-size:0.8rem; flex:1; }
.stars { display:flex; gap:1px; }
.star { font-size:0.85rem; cursor:pointer; color:#3a3a5a; }
.star.filled { color:#fbbf24; }
.action-btns { display:flex; gap:4px; align-items:center; }
.mal-btn { background:#1e2a3a; border:1px solid #60a5fa; border-radius:6px; color:#60a5fa; font-size:0.62rem; padding:2px 5px; text-decoration:none; font-weight:600; }
.move-btn { background:none; border:1px solid #2a2a45; border-radius:6px; color:#a78bfa; font-size:0.7rem; cursor:pointer; padding:2px 5px; }
.del-btn { background:none; border:none; color:#3a2a2a; font-size:0.95rem; cursor:pointer; padding:0 2px; }
.move-menu { display:none; padding:8px 10px; border-top:1px solid #2a2a45; gap:6px; flex-wrap:wrap; }
.move-menu.show { display:flex; }
.move-menu-btn { flex:1; min-width:70px; padding:6px 8px; border-radius:7px; border:none; font-size:0.72rem; font-weight:600; cursor:pointer; }
.random-card { display:none; background:#1e1e35; border-radius:12px; padding:14px; margin-bottom:12px; text-align:center; border:1px solid #f472b6; }
.random-card.show { display:block; }
.random-card p { font-size:0.7rem; color:#6b6b8a; margin-bottom:6px; }
.random-card h3 { font-size:1rem; color:#f472b6; margin-bottom:10px; }
.random-card-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.rc-btn { padding:6px 14px; border-radius:8px; border:none; font-size:0.75rem; font-weight:600; cursor:pointer; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1e3a2f; color:#4ade80; padding:10px 20px; border-radius:10px; font-size:0.82rem; font-weight:600; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; border:1px solid #4ade80; }
.toast.show { opacity:1; }
.toast.red { background:#3a1e1e; color:#f87171; border-color:#f87171; }
.toast.blue { background:#1e2a3a; color:#60a5fa; border-color:#60a5fa; }
.toast.yellow { background:#2a2a1e; color:#fbbf24; border-color:#fbbf24; }
.empty { text-align:center; color:#4b4b7a; font-size:0.8rem; padding:16px 0; }
</style>
</head>
<body>
<h1>🎌 Anime Tracker</h1>
<p class="subtitle">Track • Rate • Plan</p>

<div class="stats">
  <div class="stat"><div class="stat-num c-green" id="s-watched">0</div><div class="stat-label">Watched</div></div>
  <div class="stat"><div class="stat-num c-blue" id="s-watching">0</div><div class="stat-label">Watching</div></div>
  <div class="stat"><div class="stat-num c-yellow" id="s-want">0</div><div class="stat-label">Want</div></div>
  <div class="stat"><div class="stat-num c-red" id="s-dropped">0</div><div class="stat-label">Dropped</div></div>
</div>

<div class="add-bar">
  <input type="text" id="animeInput" placeholder="Anime ka naam daal..." />
  <button class="add-btn" id="addBtn">+ Add</button>
</div>
<div class="add-options" id="addOptions">
  <button class="opt-btn opt-watched" data-addto="watched">✅ Watched</button>
  <button class="opt-btn opt-watching" data-addto="watching">▶️ Watching</button>
  <button class="opt-btn opt-want" data-addto="want">🔖 Want</button>
  <button class="opt-btn opt-dropped" data-addto="dropped">❌ Dropped</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="watched">✅ Watched</div>
  <div class="tab" data-tab="watching">▶️ Watching</div>
  <div class="tab" data-tab="want">🔖 Want</div>
  <div class="tab" data-tab="dropped">❌ Dropped</div>
</div>

<div class="toolbar">
  <button class="sort-btn active" data-sort="default">Default</button>
  <button class="sort-btn" data-sort="name">A-Z</button>
  <button class="sort-btn" data-sort="rating">⭐ Rating</button>
  <div style="flex:1"></div>
  <button class="random-btn" id="randomBtn">🎲 Random</button>
</div>

<div class="random-card" id="randomCard">
  <p>🎲 Aaj yeh dekh bhai!</p>
  <h3 id="randomName"></h3>
  <div class="random-card-btns">
    <button class="rc-btn" id="randomWatch" style="background:#1e2a3a;color:#60a5fa;">▶️ Watching</button>
    <a class="rc-btn mal-btn" id="randomMal" href="#" target="_blank" style="padding:6px 14px;">🔍 MAL</a>
    <button class="rc-btn" id="randomClose" style="background:#1e1e35;color:#6b6b8a;">✕ Close</button>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title" id="sectionTitle">✅ Watched <span class="badge badge-watched" id="sectionCount">0</span></div>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>
  <div class="anime-list" id="animeList"></div>
</div>

<div style="text-align:center;margin-top:24px;font-size:0.72rem;color:#6b6b8a;">made by pushkar ✨</div>
<div class="toast" id="toast"></div>

<script>
var TYPES = {
  watched:  { label:'✅ Watched',  badge:'badge-watched',  dot:'dot-watched',  toastClass:'' },
  watching: { label:'▶️ Watching', badge:'badge-watching', dot:'dot-watching', toastClass:'blue' },
  want:     { label:'🔖 Want',     badge:'badge-want',     dot:'dot-want',     toastClass:'yellow' },
  dropped:  { label:'❌ Dropped',  badge:'badge-dropped',  dot:'dot-dropped',  toastClass:'red' }
};

var DEFAULT_DATA = {
  watched: [
    "Attack on Titan","Death Note","Demon Slayer","One Piece (3 seasons)","Chainsaw Man",
    "Blue Lock","Cyberpunk Edgerunners","The Quintessential Quintuplets","My Dress-Up Darling",
    "Darling in the FranXX","My Hero Academia","Solo Leveling","Tensura","Dr. Stone",
    "Jujutsu Kaisen","Daemons of the Shadow Realm","Classroom of the Elite","Horimiya",
    "A Couple of Cuckoos","Sword Art Online","Gachiakuta","Spy x Family",
    "I Got a Cheat Skill in Another World","More than a Married Couple but Not Lovers",
    "Can a Boy-Girl Friendship Survive","Re:Zero","Dandadan","Assassination Classroom",
    "Mushoku Tensei","Tomo-chan Is a Girl",
    "Alya Sometimes Hides Her Feelings in Russian","Mob Psycho 100","Shangri-La Frontier",
    "Kaiju No. 8","Wind Breaker","Tokyo Revengers","Mashle","Tower of God","Your Lie in April",
    "Beast Tamer","Berserk of Gluttony","A Sign of Affection","Zom 100","A Condition Called Love",
    "Our Dating Story","Medaka Kuroiwa Is Impervious to My Charms","Grand Blue",
    "The Summer Hikaru Died","Please Put Them On Takamine-san","Higehiro","A Silent Voice",
    "Suzume","Weathering with You","I Made Friends with the Second Prettiest Girl in My Class",
    "The Girl I Like Forgot Her Glasses","The Fragrant Flower Blooms with Dignity",
    "Nukitashi the Animation","Elfen Lied","Redo of Healer","Komi Can't Communicate",
    "Kubo Won't Let Me Be Invisible","Takopi's Original Sin","You and I Are Polar Opposites",
    "Erased","Chained Soldier","I'm Getting Married to a Girl I Hate in My Class"
  ].map(function(n){ return {name:n, rating:0}; }),
  watching: [],
  want: [],
  dropped: [
    "Haikyuu","Bunny Girl Senpai","Black Clover","Rent a Girlfriend",
    "Konosuba","Frieren","Fire Force","Kamisama Kiss"
  ].map(function(n){ return {name:n, rating:0}; })
};

var data;
try {
  var saved = localStorage.getItem('anime_v3');
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
} catch(e) {
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
}

var currentTab = 'watched';
var currentSort = 'default';
var randomItem = null;
var randomFromType = null;

function save() {
  try { localStorage.setItem('anime_v3', JSON.stringify(data)); } catch(e) {}
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function(){ t.className = 'toast'; }, 2500);
}

function updateStats() {
  document.getElementById('s-watched').textContent = data.watched.length;
  document.getElementById('s-watching').textContent = data.watching.length;
  document.getElementById('s-want').textContent = data.want.length;
  document.getElementById('s-dropped').textContent = data.dropped.length;
}

function getSorted(type) {
  var list = data[type].slice();
  if (currentSort === 'name') {
    list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  } else if (currentSort === 'rating') {
    list.sort(function(a,b){ return b.rating - a.rating; });
  }
  return list;
}

function render() {
  var type = currentTab;
  var info = TYPES[type];
  var sorted = getSorted(type);

  document.getElementById('sectionTitle').innerHTML =
    info.label + ' <span class="badge ' + info.badge + '" id="sectionCount">' + data[type].length + '</span>';

  var container = document.getElementById('animeList');
  container.innerHTML = '';

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty">Koi anime nahi hai yahan!</div>';
    updateStats();
    return;
  }

  sorted.forEach(function(item, i) {
    var origIdx = data[type].indexOf(item);
    var div = document.createElement('div');
    div.className = 'anime-item ' + type + '-item';

    var starsHtml = '';
    if (type === 'watched') {
      starsHtml = '<div class="stars">';
      for (var s = 1; s <= 5; s++) {
        starsHtml += '<span class="star' + (item.rating >= s ? ' filled' : '') + '" data-s="' + s + '">★</span>';
      }
      starsHtml += '</div>';
    }

    var otherBtns = '';
    Object.keys(TYPES).forEach(function(t) {
      if (t !== type) {
        otherBtns += '<button class="move-menu-btn opt-' + t + '" data-to="' + t + '">' + TYPES[t].label + '</button>';
      }
    });

    var malUrl = 'https://myanimelist.net/search/all?q=' + encodeURIComponent(item.name) + '&cat=anime';

    div.innerHTML =
      '<div class="anime-main">' +
        '<span class="num">' + (i+1) + '</span>' +
        '<span class="dot ' + info.dot + '"></span>' +
        '<span class="anime-name">' + item.name + '</span>' +
        starsHtml +
        '<div class="action-btns">' +
          '<a class="mal-btn" href="' + malUrl + '" target="_blank">MAL</a>' +
          '<button class="move-btn">↕</button>' +
          '<button class="del-btn">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="move-menu">' + otherBtns + '</div>';

    // Move toggle
    div.querySelector('.move-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var menu = div.querySelector('.move-menu');
      document.querySelectorAll('.move-menu.show').forEach(function(m) {
        if (m !== menu) m.classList.remove('show');
      });
      menu.classList.toggle('show');
    });

    // Delete
    div.querySelector('.del-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm(item.name + ' delete karna hai?')) {
        data[type].splice(origIdx, 1);
        save(); render();
        showToast('Delete ho gaya!', 'red');
      }
    });

    // Move menu buttons
    div.querySelectorAll('.move-menu-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var toType = btn.getAttribute('data-to');
        var it = data[type].splice(origIdx, 1)[0];
        data[toType].push(it);
        save(); render();
        showToast(TYPES[toType].label + ' mein gaya!', TYPES[toType].toastClass);
      });
    });

    // Stars
    if (type === 'watched') {
      div.querySelectorAll('.star').forEach(function(star) {
        star.addEventListener('click', function(e) {
          e.stopPropagation();
          var s = parseInt(star.getAttribute('data-s'));
          data[type][origIdx].rating = (data[type][origIdx].rating === s) ? 0 : s;
          save(); render();
        });
      });
    }

    container.appendChild(div);
  });

  updateStats();
}

// Tabs
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    currentTab = tab.getAttribute('data-tab');
    currentSort = 'default';
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    document.querySelectorAll('.sort-btn').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-sort') === 'default');
    });
    var showRandom = currentTab === 'dropped' || currentTab === 'want';
    document.getElementById('randomBtn').style.display = showRandom ? 'block' : 'none';
    document.getElementById('sort-rating') && (document.getElementById('sort-rating').style.display = currentTab === 'watched' ? '' : 'none');
    document.getElementById('randomCard').classList.remove('show');
    render();
  });
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentSort = btn.getAttribute('data-sort');
    document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  });
});

// Add anime
document.getElementById('addBtn').addEventListener('click', function() {
  var name = document.getElementById('animeInput').value.trim();
  if (!name) { showToast('Pehle naam daal!', 'red'); return; }
  document.getElementById('addOptions').classList.add('show');
});

document.querySelectorAll('[data-addto]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var name = document.getElementById('animeInput').value.trim();
    if (!name) return;
    var type = btn.getAttribute('data-addto');
    data[type].push({name: name, rating: 0});
    save();
    document.getElementById('animeInput').value = '';
    document.getElementById('addOptions').classList.remove('show');
    currentTab = type;
    document.querySelectorAll('.tab').forEach(function(t){
      t.classList.toggle('active', t.getAttribute('data-tab') === type);
    });
    render();
    showToast(TYPES[type].label + ' mein add ho gaya!', TYPES[type].toastClass);
  });
});

document.getElementById('animeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.add-bar') && !e.target.closest('.add-options')) {
    document.getElementById('addOptions').classList.remove('show');
  }
  if (!e.target.closest('.move-menu') && !e.target.closest('.move-btn')) {
    document.querySelectorAll('.move-menu.show').forEach(function(m){ m.classList.remove('show'); });
  }
});

// Copy
document.getElementById('copyBtn').addEventListener('click', function() {
  var text = data[currentTab].map(function(item, i) {
    return (i+1) + '. ' + item.name + (item.rating ? ' (' + '★'.repeat(item.rating) + ')' : '');
  }).join('\n');
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
});

// Random
document.getElementById('randomBtn').addEventListener('click', function() {
  var list = data[currentTab];
  if (list.length === 0) { showToast('List khaali hai!', 'red'); return; }
  var idx = Math.floor(Math.random() * list.length);
  randomItem = list[idx];
  randomFromType = currentTab;
  document.getElementById('randomName').textContent = randomItem.name;
  document.getElementById('randomMal').href = 'https://myanimelist.net/search/all?q=' + encodeURIComponent(randomItem.name) + '&cat=anime';
  document.getElementById('randomCard').classList.add('show');
});

document.getElementById('randomWatch').addEventListener('click', function() {
  if (!randomItem) return;
  var idx = data[randomFromType].indexOf(randomItem);
  if (idx > -1) { data[randomFromType].splice(idx, 1); }
  data.watching.push(randomItem);
  save();
  document.getElementById('randomCard').classList.remove('show');
  currentTab = 'watching';
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.getAttribute('data-tab') === 'watching');
  });
  render();
  showToast('Watching mein daal diya!', 'blue');
});

document.getElementById('randomClose').addEventListener('click', function() {
  document.getElementById('randomCard').classList.remove('show');
});

// Rating sort btn id
document.querySelectorAll('.sort-btn').forEach(function(b){
  if (b.getAttribute('data-sort') === 'rating') b.id = 'sort-rating';
});

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

render();
</script>
</body>
</html>
